# Integration test infrastructure — ephemeral Postgres+pgvector and Redis
# Usage: docker compose -f docker-compose.test.yml up -d
# Teardown: docker compose -f docker-compose.test.yml down -v
#
# Ports are mapped to non-default values to avoid conflicts with running services.
# tmpfs for Postgres data = fast, ephemeral, no disk cleanup needed.

services:
  test-postgres:
    image: pgvector/pgvector:pg16
    container_name: open-brain-test-postgres
    environment:
      POSTGRES_DB: openbrain_test
      POSTGRES_USER: openbrain_test
      POSTGRES_PASSWORD: test_password
    ports:
      - "5433:5432"
    tmpfs:
      - /var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U openbrain_test -d openbrain_test -h 127.0.0.1"]
      interval: 2s
      timeout: 3s
      retries: 10
      start_period: 5s

  test-redis:
    image: redis:7-alpine
    container_name: open-brain-test-redis
    ports:
      - "6381:6379"
    command: redis-server --save ""
    healthcheck:
      test: ["CMD", "redis-cli", "-h", "127.0.0.1", "ping"]
      interval: 2s
      timeout: 3s
      retries: 10
