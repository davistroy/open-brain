# Cloudflare Tunnel Configuration — Open Brain
#
# HTTPS terminates at Cloudflare; the tunnel carries plain HTTP internally.
# Tunnel identity comes from CLOUDFLARE_TUNNEL_TOKEN env var (from Bitwarden).
# This file controls ingress routing only — no credentials stored here.
#
# Routing:
#   /mcp  → core-api:3000  (MCP endpoint, direct — bypasses nginx)
#   /*    → web:80          (nginx proxies /api/* to core-api internally)

ingress:
  # MCP endpoint — routes directly to Core API (nginx doesn't proxy /mcp)
  - hostname: brain.k4jda.net
    path: /mcp
    service: http://core-api:3000

  # All other traffic — Web UI (nginx proxies /api/* to core-api internally)
  - hostname: brain.k4jda.net
    service: http://web:80

  # Catch-all required by cloudflared — returns 404 for unmatched hostnames
  - service: http_status:404
