# Named pipeline definitions for Open Brain.
#
# Each pipeline defines an ordered list of stages. The ingestion worker
# resolves the pipeline name from the capture's source or explicit
# pipelineName job field (defaults to 'default').
#
# Stage options:
#   name        - Stage identifier (matches worker handler keys)
#   enabled     - Whether to run this stage (default: true)
#   timeout_ms  - Per-stage wall-clock timeout before failure (default: 30000)
#   options     - Stage-specific config passed to the handler
#
# Retry and sweep settings are inherited from pipeline.yaml (global).

pipelines:

  # ── default ─────────────────────────────────────────────────────────────────
  # Standard text capture pipeline: embed → extract metadata → check triggers → notify.
  # Used for Slack captures, manual entries, and any source without a specific pipeline.
  default:
    stages:
      - name: embed
        enabled: true
        timeout_ms: 60000
      - name: extract_metadata
        enabled: true
        timeout_ms: 30000
        options:
          prompt_template: extract_metadata
          model_alias: fast
      - name: check_triggers
        enabled: true
        timeout_ms: 15000
      - name: notify
        enabled: true
        timeout_ms: 15000
        options:
          channel: pushover

  # ── voice ────────────────────────────────────────────────────────────────────
  # Voice memo pipeline. Transcription has already produced content_raw by the
  # time this pipeline runs (voice-capture service pre-extracts). The
  # extract_metadata stage merges pre-extracted fields with LLM output.
  voice:
    stages:
      - name: embed
        enabled: true
        timeout_ms: 60000
      - name: extract_metadata
        enabled: true
        timeout_ms: 30000
        options:
          prompt_template: extract_metadata
          model_alias: fast
          merge_with_pre_extracted: true
      - name: check_triggers
        enabled: true
        timeout_ms: 15000
      - name: notify
        enabled: true
        timeout_ms: 15000
        options:
          channel: pushover
          priority: high

  # ── career ───────────────────────────────────────────────────────────────────
  # Extended pipeline for captures tagged to the career brain view.
  # Adds extract_career_signals after metadata extraction to capture
  # wins, blockers, decisions, and professional observations explicitly.
  career:
    stages:
      - name: embed
        enabled: true
        timeout_ms: 60000
      - name: extract_metadata
        enabled: true
        timeout_ms: 30000
        options:
          prompt_template: extract_metadata
          model_alias: fast
      - name: extract_career_signals
        enabled: true
        timeout_ms: 30000
        options:
          prompt_template: extract_metadata
          model_alias: fast
          focus: career
      - name: check_triggers
        enabled: true
        timeout_ms: 15000
      - name: notify
        enabled: true
        timeout_ms: 15000
        options:
          channel: pushover
