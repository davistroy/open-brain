# PostgreSQL configuration for Open Brain — development
# Tuned for Intel i7-9700 / 128GB RAM host, ~8GB container memory limit

# Memory
shared_buffers = 2GB
effective_cache_size = 6GB
maintenance_work_mem = 512MB
work_mem = 64MB

# Connections
listen_addresses = '*'
max_connections = 50

# WAL
wal_level = replica
wal_buffers = 64MB
min_wal_size = 1GB
max_wal_size = 4GB
checkpoint_completion_target = 0.9

# Planner
random_page_cost = 1.1
effective_io_concurrency = 200

# Logging — emit slow queries (>1s) for analysis
log_min_duration_statement = 1000
