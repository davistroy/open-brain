networks:
  open-brain:
    driver: bridge

volumes:
  postgres_data:
  redis_data:

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: open-brain-postgres
    environment:
      POSTGRES_DB: openbrain
      POSTGRES_USER: openbrain
      POSTGRES_PASSWORD: openbrain_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./config/postgres/postgresql.conf:/etc/postgresql/postgresql.conf
    command: postgres -c config_file=/etc/postgresql/postgresql.conf
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U openbrain -d openbrain"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - open-brain

  redis:
    image: redis:7-alpine
    container_name: open-brain-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - open-brain

  core-api:
    build:
      context: .
      target: core-api
    container_name: open-brain-core-api
    env_file:
      - .env.secrets
    environment:
      NODE_ENV: production
      PORT: "3000"
      POSTGRES_URL: postgresql://openbrain:${POSTGRES_PASSWORD}@postgres:5432/openbrain
      REDIS_URL: redis://redis:6379
      LITELLM_URL: https://llm.k4jda.net
      # LITELLM_API_KEY: set in .env.secrets
      # MCP_API_KEY: set in .env.secrets
    ports:
      - "3000:3000"
    volumes:
      - ./config:/app/config:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:3000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    networks:
      - open-brain
    restart: unless-stopped

  workers:
    build:
      context: .
      target: workers
    container_name: open-brain-workers
    env_file:
      - .env.secrets
    environment:
      NODE_ENV: production
      POSTGRES_URL: postgresql://openbrain:${POSTGRES_PASSWORD}@postgres:5432/openbrain
      REDIS_URL: redis://redis:6379
      LITELLM_URL: https://llm.k4jda.net
      CORE_API_URL: http://core-api:3000
      # LITELLM_API_KEY: set in .env.secrets
    volumes:
      - ./config:/app/config:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - open-brain
    restart: unless-stopped
